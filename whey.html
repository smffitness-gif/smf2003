<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, initial-scale=1.0">
    <title>Document</title>
      <link rel="stylesheet" href="style.css">

</head>

<body>
    <nav class="navbar">
        <h2>Whey Protein</h2>
    </nav>

    <div id="grid" class="grid"></div>

    <div id="detail" class="product-detail" style="display:none;">
        <img id="pimg">
        <h3 id="pname"></h3>
        <p id="pprice"></p>
        <ul id="pdesc"></ul>
        <button onclick="showOrder()">Order</button>
        <button onclick="backToGrid()">⬅ Back</button>
    </div>

    <div id="order" class="product-detail" style="display:none;">
        <h3>Order Form</h3>
        <img id="oimg">
        <h4 id="oname"></h4>
        <p id="oprice"></p>
        <input id="name" placeholder="Name">
        <input id="phone" placeholder="Phone">
        <input id="email" placeholder="Email">
        <button onclick="orderNow()">Submit</button>
        <button onclick="backToDetail()">⬅ Back</button>
    </div>

    <script>
        const products = [
            { name: "Whey 1", price: 1200, img: "img/whey1.jpg", desc: ["High quality", "Muscle growth", "Tasty"] },
            { name: "Whey 2", price: 1300, img: "img/whey2.jpg", desc: ["Premium whey", "Boost recovery", "Rich protein"] },
            { name: "Whey 3", price: 1400, img: "img/whey3.jpg", desc: ["Fast absorption", "Strength", "Delicious"] },
            { name: "Whey 4", price: 1500, img: "img/whey4.jpg", desc: ["Powerful", "Recovery", "Amino rich"] },
            { name: "Whey 5", price: 1600, img: "img/whey5.jpg", desc: ["Tasty flavor", "Muscle support", "High protein"] },
            { name: "Whey 6", price: 1700, img: "img/whey6.jpg", desc: ["Energy boost", "Recovery", "Premium"] },
            { name: "Whey 7", price: 1800, img: "img/whey7.jpg", desc: ["Fast digest", "Strength", "Performance"] },
            { name: "Whey 8", price: 1900, img: "img/whey8.jpg", desc: ["High quality", "Tasty", "Muscle gain"] },
            { name: "Whey 9", price: 2000, img: "img/whey9.jpg", desc: ["Protein rich", "Boosts energy", "Recovery"] },
            { name: "Whey 10", price: 2100, img: "img/whey10.jpg", desc: ["Premium whey", "Strength", "Fast absorption"] },
            { name: "Whey 11", price: 2200, img: "img/whey11.jpg", desc: ["Muscle growth", "Recovery", "Energy"] },
            { name: "Whey 12", price: 2300, img: "img/whey12.jpg", desc: ["High quality", "Tasty", "Performance"] },
            { name: "Whey 13", price: 2400, img: "img/whey13.jpg", desc: ["Protein rich", "Muscle support", "Fast digest"] },
            { name: "Whey 14", price: 2500, img: "img/whey14.jpg", desc: ["Premium whey", "Recovery", "Strength"] },
            { name: "Whey 15", price: 2600, img: "img/whey15.jpg", desc: ["Tasty flavor", "Boost performance", "High protein"] },
            { name: "Whey 16", price: 2700, img: "img/whey16.jpg", desc: ["Energy boost", "Muscle gain", "Recovery"] },
            { name: "Whey 17", price: 2800, img: "img/whey17.jpg", desc: ["Fast absorption", "Strength", "Premium"] },
            { name: "Whey 18", price: 2900, img: "img/whey18.jpg", desc: ["High quality", "Tasty", "Muscle support"] },
            { name: "Whey 19", price: 3000, img: "img/whey19.jpg", desc: ["Protein rich", "Recovery", "Performance"] },
            { name: "Whey 20", price: 3100, img: "img/whey20.jpg", desc: ["Premium whey", "Boost energy", "Fast digest"] }
        ];

        // Render grid
        const grid = document.getElementById("grid");
        products.forEach((p, i) => {
            const div = document.createElement("div");
            div.className = "product-card";
            div.innerHTML = `<img src="${p.img}" alt="${p.name}"><h4>${p.name}</h4><p>₹${p.price}</p>`;
            div.onclick = () => showDetail(i);
            grid.appendChild(div);
        });

        let currentProduct = null;
        function showDetail(i) {
            currentProduct = products[i];
            document.getElementById("pimg").src = currentProduct.img;
            document.getElementById("pname").innerText = currentProduct.name;
            document.getElementById("pprice").innerText = "₹" + currentProduct.price;
            const ul = document.getElementById("pdesc");
            ul.innerHTML = "";
            currentProduct.desc.forEach(d => { const li = document.createElement("li"); li.innerText = d; ul.appendChild(li); });
            grid.style.display = "none";
            document.getElementById("detail").style.display = "block";
        }
        function backToGrid() { document.getElementById("detail").style.display = "none"; grid.style.display = "grid"; }
        function showOrder() {
            document.getElementById("oimg").src = currentProduct.img;
            document.getElementById("oname").innerText = currentProduct.name;
            document.getElementById("oprice").innerText = "₹" + currentProduct.price;
            document.getElementById("detail").style.display = "none";
            document.getElementById("order").style.display = "block";
        }
        function backToDetail() { document.getElementById("order").style.display = "none"; document.getElementById("detail").style.display = "block"; }
        function orderNow() {
            const name = encodeURIComponent(document.getElementById("name").value.trim());
            const phone = encodeURIComponent(document.getElementById("phone").value.trim());
            const email = encodeURIComponent(document.getElementById("email").value.trim());
            if (!name || !phone || !email) { alert("Please fill all fields!"); return; }
            const msg = `Order:%0AProduct: ${encodeURIComponent(currentProduct.name)}%0APrice: ₹${currentProduct.price}%0AName: ${name}%0APhone: ${phone}%0AEmail: ${email}`;
            window.open(`https://api.whatsapp.com/send?phone=917339563621&text=${msg}`, "_blank");
        }
    </script>
</body>

</html>
