<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, initial-scale=1.0">
    <title>Document</title>
      <link rel="stylesheet" href="style.css">

        <style>
            body {
                margin: 0;
                font-family: Arial;
                background: #0f0f0f;
                color: white;
                text-align: center;
            }

            .navbar {
                background: #111;
                padding: 15px;
            }

            .list {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                padding: 50px;
            }

            .list button {
                padding: 20px;
                background: #ff6600;
                border: none;
                color: white;
                font-size: 18px;
                cursor: pointer;
                border-radius: 10px;
            }

            .list button:hover {
                background: #00c853;
            }

            @media (max-width:768px) {
                .list {
                    grid-template-columns: repeat(2, 1fr);
                }
            }
        </style>
    </head>

<body>

    <div class="navbar">
        <h2>SMF FITNESS PRODUCTS</h2>
    </div>

    <h2>Select Category</h2>
    <div class="list">
        <button onclick="location.href='whey.html'">Whey Protein</button>
        <button onclick="location.href='creatine.html'">Creatine</button>
        <button onclick="location.href='pre.html'">Pre Workout</button>
        <button onclick="location.href='bcaa.html'">BCAA</button>
        <button onclick="location.href='eaa.html'">EAA</button>
        <button onclick="location.href='gainer.html'">Mass Gainer</button>
    </div>

</body>

</html>
